{% extends "base/base.html" %}
{% block title %}Page Not Found — {{ site_name }}{% endblock %}
{% block newsletter %}{% endblock %}

{% block content %}
<section class="error-section" style="margin-top:72px;min-height:70vh;display:flex;align-items:center;">
    <div class="container text-center py-5">
        <h1 class="fw-bold" style="font-size:8rem;line-height:1;color:#1a1a2e;">404</h1>
        <h3 class="fw-bold mb-3">Oops! Page Not Found</h3>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="{% url 'core:home' %}" class="btn btn-dark px-5">Go Home</a>
            <a href="{% url 'products:shop' %}" class="btn btn-outline-dark px-5">Shop Now</a>
        </div>
    </div>
</section>
{% endblock %}
