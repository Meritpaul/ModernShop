{% extends "base/base.html" %}
{% block title %}Password Reset Complete — {{ site_name }}{% endblock %}
{% block newsletter %}{% endblock %}

{% block content %}
<section class="py-5" style="margin-top:72px;min-height:70vh;display:flex;align-items:center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="p-5 border rounded-4 shadow-sm bg-white text-center">
                    <i class="bi bi-check-circle fs-1 mb-3 d-block"></i>
                    <h5 class="fw-bold">Password Reset!</h5>
                    <p class="text-muted small">Your password has been changed successfully.</p>
                    <a href="{% url 'users:login' %}" class="btn btn-dark w-100 py-2 mt-2">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
